  - test_id: "t_001"
    description: "Schema validation — acute chest pain in elderly patient"
    input_text: "I'm 72 years old and I've been having crushing chest pain for the past hour. I also feel nauseous and short of breath."
    monitor_type: "schema"
    monitor_config:
      json_schema:
        type: object
        required: [urgency, department, follow_up_questions, safety_warnings, summary, metadata]
        properties:
          urgency:
            type: string
            enum: ["non_urgent", "semi_urgent", "urgent", "emergency"]
          department:
            type: string
            enum: ["general_practice", "cardiology", "neurology", "orthopedics", "gastroenterology", "dermatology", "psychiatry", "emergency", "pediatrics", "oncology"]
          follow_up_questions:
            type: array
            items:
              type: string
          safety_warnings:
            type: array
            items:
              type: string
          summary:
            type: string
          metadata:
            type: object
    tags: ["schema_sensitive", "cardiology"]
    sensitive_to: ["format"]

