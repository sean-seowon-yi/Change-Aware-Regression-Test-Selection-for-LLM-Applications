  - test_id: "t_001"
    description: "Schema validation — billing dispute with double charge"
    input_text: "Customer C-1042 here. I was charged twice on invoice #8831 for $75 each. Please fix this right away."
    monitor_type: "schema"
    monitor_config:
      json_schema:
        type: object
        required: [action, priority, customer_id, summary, metadata]
        properties:
          action:
            type: string
            enum: ["billing", "refund", "cancellation", "upgrade", "complaint", "inquiry", "feedback", "escalation"]
          priority:
            type: string
            enum: ["low", "medium", "high", "critical"]
          customer_id:
            type: string
          summary:
            type: string
          metadata:
            type: object
    tags: ["schema_sensitive", "billing"]
    sensitive_to: ["format"]

