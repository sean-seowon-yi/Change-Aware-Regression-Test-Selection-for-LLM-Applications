    monitor_type: "code_execution"
    monitor_config:
      language: "python"
      test_code: "assert tuples_to_dict([('a', 1), ('b', 2)]) == {'a': 1, 'b': 2}\nassert tuples_to_dict([('a', 1), ('a', 2)]) == {'a': [1, 2]}\nassert tuples_to_dict([]) == {}\nassert tuples_to_dict([('x', 10), ('y', 20), ('x', 30)]) == {'x': [10, 30], 'y': 20}\nprint('PASS')"
      expected_output: "PASS"
      timeout_seconds: 10
    tags: ["code_correctness", "data_transformation"]
    sensitive_to: ["demonstration", "format"]

  - test_id: "t_016"
    description: "Code correctness — parse a CSV string"
    input_text: "Write parse_csv(csv_string) that takes a CSV-formatted string (with newline-separated rows and comma-separated values) and returns a list of dictionaries, using the first row as headers."
    monitor_type: "code_execution"
    monitor_config:
      language: "python"
      test_code: "csv_data = 'name,age,city\\nAlice,30,NYC\\nBob,25,LA'\nresult = parse_csv(csv_data)\nassert result == [{'name': 'Alice', 'age': '30', 'city': 'NYC'}, {'name': 'Bob', 'age': '25', 'city': 'LA'}]\nassert parse_csv('a,b\\n1,2') == [{'a': '1', 'b': '2'}]\nassert parse_csv('col1\\nval1') == [{'col1': 'val1'}]\nprint('PASS')"
      expected_output: "PASS"
      timeout_seconds: 10
    tags: ["code_correctness", "data_transformation"]
    sensitive_to: ["demonstration", "format"]

  - test_id: "t_017"
    description: "Code correctness — normalize nested JSON to flat dict"
    input_text: "Write flatten_json(obj, sep='.') that flattens a nested dictionary into a single-level dict with compound keys. For example, {'a': {'b': 1}} becomes {'a.b': 1}."
    monitor_type: "code_execution"
    monitor_config:
      language: "python"
      test_code: "assert flatten_json({'a': {'b': 1}}) == {'a.b': 1}\nassert flatten_json({'a': 1, 'b': 2}) == {'a': 1, 'b': 2}\nassert flatten_json({'a': {'b': {'c': 3}}}) == {'a.b.c': 3}\nassert flatten_json({}) == {}\nassert flatten_json({'x': {'y': 1}, 'z': 2}) == {'x.y': 1, 'z': 2}\nassert flatten_json({'a': {'b': 1}}, sep='/') == {'a/b': 1}\nprint('PASS')"
      expected_output: "PASS"
      timeout_seconds: 10
    tags: ["code_correctness", "data_transformation"]
    sensitive_to: ["demonstration", "format"]

  # --- Common patterns (t_018 – t_020) ---

  - test_id: "t_018"
    description: "Code correctness — retry decorator"
    input_text: "Write a decorator called retry(max_retries=3, delay=0) that retries the decorated function up to max_retries times if it raises an exception. If all retries fail, re-raise the last exception. The delay parameter (in seconds) is the wait between retries."
    monitor_type: "code_execution"
    monitor_config:
      language: "python"
      test_code: "import time\ncall_count = 0\n@retry(max_retries=3, delay=0)\ndef flaky():\n    global call_count\n    call_count += 1\n    if call_count < 3:\n        raise ValueError('fail')\n    return 'ok'\nassert flaky() == 'ok'\nassert call_count == 3\n\ncall_count2 = 0\n@retry(max_retries=2, delay=0)\ndef always_fail():\n    global call_count2\n    call_count2 += 1\n    raise RuntimeError('boom')\ntry:\n    always_fail()\n    assert False, 'should have raised'\nexcept RuntimeError:\n    pass\nassert call_count2 == 2\nprint('PASS')"
      expected_output: "PASS"
      timeout_seconds: 10
    tags: ["code_correctness", "common_patterns"]
    sensitive_to: ["demonstration", "format"]

  - test_id: "t_019"
    description: "Code correctness — memoize decorator"
    input_text: "Implement a memoize decorator that caches function results based on arguments. Subsequent calls with the same arguments should return the cached value without re-executing the function."
    monitor_type: "code_execution"
    monitor_config:
      language: "python"
      test_code: "call_log = []\n@memoize\ndef add(a, b):\n    call_log.append((a, b))\n    return a + b\nassert add(1, 2) == 3\nassert add(1, 2) == 3\nassert len(call_log) == 1\nassert add(3, 4) == 7\nassert len(call_log) == 2\nprint('PASS')"
      expected_output: "PASS"
      timeout_seconds: 10
    tags: ["code_correctness", "common_patterns"]
    sensitive_to: ["demonstration", "format"]

  - test_id: "t_020"
    description: "Code correctness — singleton pattern using a metaclass"
    input_text: "Write a Singleton metaclass in Python so that any class using it as its metaclass only ever creates one instance. Repeated calls to the constructor should return the same object."
    monitor_type: "code_execution"
    monitor_config:
      language: "python"
      test_code: "class MyService(metaclass=Singleton):\n    def __init__(self, name='default'):\n        self.name = name\na = MyService('first')\nb = MyService('second')\nassert a is b\nassert a.name == 'first'\n\nclass Other(metaclass=Singleton):\n    pass\nc = Other()\nd = Other()\nassert c is d\nassert a is not c\nprint('PASS')"
      expected_output: "PASS"
      timeout_seconds: 10
    tags: ["code_correctness", "common_patterns"]
    sensitive_to: ["demonstration", "format"]

