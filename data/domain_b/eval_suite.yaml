  # --- Error handling (demo ex5): 3 tests ---

  - test_id: "t_056"
    description: "Domain coverage — error handling: safe division with custom exception"
    input_text: "Write a Python function safe_divide(a, b) that returns the result of a/b. If b is zero it should raise a custom ValueError with message 'Division by zero is not allowed'. If either argument is not a number, raise TypeError with 'Both arguments must be numeric'."
    monitor_type: "code_execution"
    monitor_config:
      language: "python"
      test_code: |
        assert safe_divide(10, 2) == 5.0
        try:
            safe_divide(1, 0)
            assert False, "Should have raised ValueError"
        except ValueError as e:
            assert "Division by zero" in str(e)
        try:
            safe_divide("a", 2)
            assert False, "Should have raised TypeError"
        except TypeError as e:
            assert "numeric" in str(e)
        print("PASS")
      expected_output: "PASS"
      timeout_seconds: 10
    tags: ["domain_coverage", "error_handling"]
    sensitive_to: ["demonstration", "demo:ex5"]

  - test_id: "t_057"
    description: "Domain coverage — error handling: retry decorator with exception types"
    input_text: "Write a decorator retry(max_attempts, exceptions) that retries the decorated function up to max_attempts times if it raises any of the given exception types. After all attempts are exhausted it should re-raise the last exception."
    monitor_type: "code_execution"
    monitor_config:
      language: "python"
      test_code: |
        call_count = 0
        @retry(max_attempts=3, exceptions=(ValueError,))
        def flaky():
            global call_count
            call_count += 1
            if call_count < 3:
                raise ValueError("not yet")
            return "ok"
        assert flaky() == "ok"
        assert call_count == 3
        print("PASS")
      expected_output: "PASS"
      timeout_seconds: 10
    tags: ["domain_coverage", "error_handling"]
    sensitive_to: ["demonstration", "demo:ex5"]

  - test_id: "t_058"
    description: "Domain coverage — error handling: validate nested dict keys"
    input_text: "Write a function validate_keys(data, required_keys) where data is a dictionary and required_keys is a list of dot-separated key paths like ['user.name', 'user.email', 'settings.theme']. Return a list of missing key paths. Raise TypeError if data is not a dict."
    monitor_type: "code_execution"
    monitor_config:
      language: "python"
      test_code: |
        d = {"user": {"name": "Alice", "email": "a@b.com"}, "settings": {}}
        assert validate_keys(d, ["user.name", "user.email", "settings.theme"]) == ["settings.theme"]
        assert validate_keys(d, ["user.name"]) == []
        try:
            validate_keys("not a dict", ["key"])
            assert False, "Should have raised TypeError"
        except TypeError:
            pass
        print("PASS")
      expected_output: "PASS"
      timeout_seconds: 10
    tags: ["domain_coverage", "error_handling"]
    sensitive_to: ["demonstration", "demo:ex5"]

